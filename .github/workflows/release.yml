name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: npm version argument, for example patch, minor, major, or 0.1.1
        required: true
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: node bin/execfence.js run -- npm test
      - run: npm run scan
      - run: node bin/execfence.js scan --ci --format sarif . > execfence.sarif
      - run: node bin/execfence.js manifest
      - run: node bin/execfence.js pack-audit
      - run: npm version "${{ inputs.version }}" --no-git-tag-version
      - run: node scripts/update-changelog.cjs
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"
      - run: npm publish --access public --provenance
      - run: git push --follow-tags
